            if (trimmed.startsWith('{') && trimmed.endsWith('}')) {
                parseJSONLine(trimmed);
                return;
            }
        }

        function parseCSVLine(line) {
            const parts = line.split(',');
            if (parts.length < 3) return;
            let seq = null;
            let timestamp = null;
            let name = '';
            let value = NaN;
            if (parts.length >= 4 && Number.isFinite(Number(parts[0])) && Number.isFinite(Number(parts[1]))) {
                seq = Number(parts[0]);
                timestamp = Number(parts[1]);
                name = parts[2].trim();
                value = Number(parts[3]);
            } else {
                timestamp = Number(parts[0]);
                name = parts[1].trim();
                value = Number(parts[2]);
            }
            if (!Number.isFinite(timestamp) || name.length === 0 || !Number.isFinite(value)) return;
            const normalizedName = isAlias(name, LINE_SENSOR_PACKED_ALIASES) ? LINE_SENSOR_PACKED_KEY
                : isAlias(name, LINE_SENSOR_ALIASES) ? LINE_SENSOR_KEY
                : isAlias(name, LINE_DIRECTION_ALIASES) ? LINE_DIRECTION_KEY
                : isAlias(name, ESCAPE_DIRECTION_ALIASES) ? ESCAPE_DIRECTION_KEY
                : isAlias(name, LINE_DISTANCE_ALIASES) ? LINE_DISTANCE_KEY
                : name;
            rememberLogEntry({ seq: Number.isFinite(seq) ? seq : null, timestamp, name: normalizedName, value });
            if ((normalizedName === LINE_SENSOR_KEY || normalizedName === LINE_SENSOR_PACKED_KEY) && !sensorNames.includes(LINE_SENSOR_KEY)) {
                sensorNames.push(LINE_SENSOR_KEY);
            }
        }

        function parseJSONLine(jsonLine) {
            try {
                const obj = JSON.parse(jsonLine);
                const seq = Number(obj.i ?? obj.seq);
                const timestamp = Number(obj.t);
                const name = String(obj.n || '');
                const value = Number(obj.v);
                if (!Number.isFinite(timestamp) || name.length === 0 || !Number.isFinite(value)) return;
                const normalizedName = isAlias(name, LINE_SENSOR_PACKED_ALIASES) ? LINE_SENSOR_PACKED_KEY
                    : isAlias(name, LINE_SENSOR_ALIASES) ? LINE_SENSOR_KEY
                    : isAlias(name, LINE_DIRECTION_ALIASES) ? LINE_DIRECTION_KEY
                    : isAlias(name, ESCAPE_DIRECTION_ALIASES) ? ESCAPE_DIRECTION_KEY
                    : isAlias(name, LINE_DISTANCE_ALIASES) ? LINE_DISTANCE_KEY
                    : name;
                rememberLogEntry({ seq: Number.isFinite(seq) ? seq : null, timestamp, name: normalizedName, value });
                if ((normalizedName === LINE_SENSOR_KEY || normalizedName === LINE_SENSOR_PACKED_KEY) && !sensorNames.includes(LINE_SENSOR_KEY)) {
                    sensorNames.push(LINE_SENSOR_KEY);
                }
            } catch (error) {
                console.warn('Invalid JSON line:', jsonLine);
            }
        }

        function parseLineStateLine(line) {
            const parts = line.split(',');
            if (parts.length < 4) {
                return;
            }

            const packedBits = Number(parts[0]);
            const azimuth = Number(parts[1]);
            const magnitude = Number(parts[2]);
            const escapeDirection = parts.length >= 4 ? Number(parts[3]) : (Math.round(azimuth) + 180) % 360;
            if (!Number.isFinite(packedBits) || !Number.isFinite(azimuth) || !Number.isFinite(magnitude) || !Number.isFinite(escapeDirection)) {
                return;
            }

            const timestamp = Date.now();
            const frameTimestamp = timestamp + realtimeFrameCounter++;
            setRealtimeFrame([
                { seq: null, timestamp: frameTimestamp, name: LINE_SENSOR_PACKED_KEY, value: Math.max(0, Math.floor(packedBits)) },
                { seq: null, timestamp: frameTimestamp, name: LINE_DIRECTION_KEY, value: azimuth },
                { seq: null, timestamp: frameTimestamp, name: ESCAPE_DIRECTION_KEY, value: escapeDirection },
                { seq: null, timestamp: frameTimestamp, name: LINE_DISTANCE_KEY, value: magnitude }
            ]);
            sensorNames = [LINE_SENSOR_KEY];
        }

        function finalizeReceivedLogs() {
            if (logs.some(entry => Number.isFinite(entry.seq))) {
                logs.sort(compareLogEntries);
            } else {
                logs.sort((a, b) => a.timestamp - b.timestamp);
            }
        }

        function updateSensorAfterReceive() {
            if (realtimeMode && receivingLineState) {
                return;
            }
            finalizeReceivedLogs();
            activateLineViewIfAvailable();
            if (!sensorNames.includes(currentSensor) && sensorNames.length > 0) {
                currentSensor = sensorNames[0];
            }
            renderSensorButtons();
            updateDisplay();
        }

        async function sendSerialCommand(command, showInConsole = true) {
            if (writer) {
                await writer.write(command + '\n');
                if (showInConsole) {
                    addConsoleLog('> ' + command);
                }
                return;
            }

            if (wirelessConnected) {
                const supportsWireless = command.toLowerCase().startsWith('run ')
                    || command.toLowerCase().startsWith('rc ')
                    || command.toLowerCase().startsWith('m ')
                    || command.toLowerCase() === 'get model'
                    || command.toLowerCase().startsWith('set model ')
                    || command.toLowerCase() === 'clear';
                if (!supportsWireless) {
                    addConsoleLog('This command is serial-only: ' + command);
                    return;
                }

                let response;
                try {
                    response = await fetch(
                        wirelessBaseUrl + '/api/cmd?c=' + encodeURIComponent(command),
                        { method: 'GET' }
                    );
                } catch (error) {
                    handleWirelessConnectionLost(error);
                    throw error;
                }
                if (!response.ok) {
                    const httpError = new Error('WiFi HTTP ' + response.status);
                    handleWirelessConnectionLost(httpError);
                    throw httpError;
                }
                if (showInConsole) {
                    addConsoleLog('> ' + command);
                }
                return;
            }

            addConsoleLog('No transport available (Serial/WiFi).');
        }

        function requestLogs() {
            if (realtimeMode) {
                addConsoleLog('Monitor mode is active: line status is already being streamed.');
                return;
            }
            if (realtimeHistoryLogs.length > 0) {
                addConsoleLog('Showing logs captured during Monitor mode.');
                restoreRealtimeHistory();
                return;
            }
            if (port && writer) {
                logs = [];
                sensorNames = [LINE_SENSOR_KEY];
                currentSensor = null;
                currentDataIndex = 0;
                receivingCSV = false;
                lastLogSequence = null;
                sequenceGapCount = 0;
                receivedLogKeys = new Set();
                lineMonitorUsesRealtime = false;
                renderSensorButtons();
                updateDisplay();
                sendSerialCommand('GETLOGS_CSV');
            } else {
                addConsoleLog('Serial disconnected. Connect serial first.');
            }
        }

        function clearLogs() {
            if (port && writer) {
                sendSerialCommand('CLEAR');
            } else {
                logs = [];
                sensorNames = [LINE_SENSOR_KEY];
                currentSensor = null;
                currentDataIndex = 0;
                lastLogSequence = null;
                sequenceGapCount = 0;
                receivedLogKeys = new Set();
                lineMonitorUsesRealtime = false;
                renderSensorButtons();
                updateDisplay();
                addConsoleLog('Logs cleared.');
            }
        }

        function requestStatus() {
            if (port && writer) {
                sendSerialCommand('STATUS');
            } else {
                addConsoleLog('Serial disconnected.');
            }
        }

        function selectSensor(button, sensorName) {
            if (!isSensorSelectable(sensorName)) {
                return;
            }

            if (currentSensor === sensorName) {
                currentSensor = null;
                const buttons = document.querySelectorAll('.btn-sensor');
                buttons.forEach(btn => btn.classList.remove('active'));
                updateDisplay();
                return;
            }

            currentSensor = sensorName;
            const buttons = document.querySelectorAll('.btn-sensor');
            buttons.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.sensorName === sensorName);
            });
            if (!button) {
                renderSensorButtons();
            }
            updateDisplay();
        }

        class LineBreakTransformer {
            constructor() {
                this.container = '';
            }

            transform(chunk, controller) {
                this.container += chunk;
                const lines = this.container.split('\n');
                this.container = lines.pop();
                lines.forEach(line => controller.enqueue(line));
            }

            flush(controller) {
                if (this.container) {
                    controller.enqueue(this.container);
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderSensorButtons();
            updateDisplay();
            updateSlider();
            updateRealtimeButton();
            updateRcStickVisual();
            updateControlAvailability();
            const slider = document.getElementById('data-slider');
            slider.addEventListener('input', onSliderChange);
            const rcPad = document.getElementById('rcPad');
            if (rcPad) {
                rcPad.addEventListener('pointerdown', onRcPadPointerDown);
                rcPad.addEventListener('pointermove', onRcPadPointerMove);
                rcPad.addEventListener('pointerup', onRcPadPointerUp);
                rcPad.addEventListener('pointercancel', onRcPadPointerUp);
                rcPad.addEventListener('pointerleave', onRcPadPointerUp);
            }
            document.addEventListener('keydown', handleSliderArrowKey);
        });

        window.addEventListener('resize', () => {
            updateDisplay();
        });
    </script>
</body>
</html>
